apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-spring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/asfcjr/dd-stack.git
    targetRevision: main
    path: helm/app
    helm:
      releaseName: java-spring
      valueFiles:
        - ../values/java.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
