apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 1.2.4
    helm:
      releaseName: argocd-image-updater
      valuesObject:
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::749698443047:role/challenge-argocd-image-updater
        extraEnv:
          - name: HOME
            value: /tmp
        authScripts:
          enabled: true
          scripts:
            ecr-login.sh: |
              #!/bin/sh
              echo -n "AWS:$(aws ecr get-login-password --region us-east-1)"
        config:
          registries:
            - name: ECR
              prefix: 749698443047.dkr.ecr.us-east-1.amazonaws.com
              api_url: https://749698443047.dkr.ecr.us-east-1.amazonaws.com
              credentials: ext:/scripts/ecr-login.sh
              credsexpire: 6h
              default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
