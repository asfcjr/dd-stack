---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: python-flask
  namespace: apps
spec:
  parentRefs:
    - name: public
      namespace: kube-system
  rules:
    - matches:
        - path: { type: PathPrefix, value: /python }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplacePrefixMatch, replacePrefixMatch: / }
      backendRefs:
        - name: python-flask
          port: 8082
