---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rabbitmq-management
  namespace: middleware
spec:
  parentRefs:
    - name: public
      namespace: kube-system
  hostnames:
    - "rabbitmq.asfcjr.click"
  rules:
    - backendRefs:
        - name: rabbitmq
          port: 15672
