apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: dotnet-todoapi
  namespace: argocd
spec:
  # image + write-back config comes from the argocd-image-updater.argoproj.io/*
  # annotations on the dotnet-todoapi Application (gitops/registry/app-dotnet.yaml),
  # since useAnnotations makes the CR ignore writeBackConfig/images here.
  applicationRefs:
    - namePattern: "dotnet-todoapi"
      useAnnotations: true
