apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: python-flask
  namespace: argocd
spec:
  # image + write-back config comes from the argocd-image-updater.argoproj.io/*
  # annotations on the python-flask Application (gitops/registry/app-python.yaml),
  # since useAnnotations makes the CR ignore writeBackConfig/images here.
  applicationRefs:
    - namePattern: "python-flask"
      useAnnotations: true
